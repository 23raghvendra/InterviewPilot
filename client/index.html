<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="InterviewPilot - AI-powered mock interview simulator for technical and behavioral interview preparation. Practice with realistic AI interviews and get instant feedback." />
  <meta name="keywords"
    content="interview preparation, AI interview, mock interview, technical interview, coding interview, interview pilot" />
  <meta name="theme-color" content="#000000" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <title>InterviewPilot — Professional AI Interview Practice</title>
  <style>
    /* Pre-render Loading Screen */
    body { background-color: #000000; margin: 0; padding: 0; }
    #global-loader {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: #000000; z-index: 99999;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }
    #global-loader.hidden { opacity: 0; visibility: hidden; }
    .loader-spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.16, 1, 0.3, 1) infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <div id="global-loader">
    <div class="loader-spinner"></div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    window.addEventListener('load', () => {
      document.getElementById('global-loader').classList.add('hidden');
    });
  </script>
</body>

</html>
