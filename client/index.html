<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="InterviewPilot - AI-powered mock interview simulator for technical and behavioral interview preparation. Practice with realistic AI interviews and get instant feedback." />
  <meta name="keywords"
    content="interview preparation, AI interview, mock interview, technical interview, coding interview, interview pilot" />
  <meta name="theme-color" content="#000000" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <title>InterviewPilot — Professional AI Interview Practice</title>
  <style>
    /* Pre-render Loading Screen */
    body { background-color: #000000; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
    #global-loader {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-color: #000000; z-index: 99999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    #global-loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    
    .loader-grid {
      position: absolute; inset: 0;
      background-image: linear-gradient(to right, rgba(255, 255, 255, 0.04) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(255, 255, 255, 0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(circle at center, black, transparent 80%);
      -webkit-mask-image: radial-gradient(circle at center, black, transparent 80%);
      pointer-events: none;
    }

    .loader-content {
      position: relative; z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 32px;
    }

    .loader-logo {
      width: 56px; height: 56px;
      background-color: #ffffff;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.15);
      animation: pulse-logo 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse-logo {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.95); }
    }

    .loader-spinner-container {
      position: relative;
      display: flex; justify-content: center; align-items: center;
    }

    .loader-spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.16, 1, 0.3, 1) infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    .loader-text-wrapper {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }

    .loader-title {
      color: #ffffff; font-size: 15px; font-weight: 800;
      letter-spacing: -0.02em;
    }
    .loader-title span { color: #60a5fa; }
    
    .loader-subtitle {
      color: #71717a; font-size: 11px; font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
  </style>
</head>

<body>
  <div id="global-loader">
    <div class="loader-grid"></div>
    <div class="loader-content">
      <div class="loader-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 17 10 11 4 5"></polyline>
          <line x1="12" y1="19" x2="20" y2="19"></line>
        </svg>
      </div>
      <div class="loader-spinner-container">
        <div class="loader-spinner"></div>
      </div>
      <div class="loader-text-wrapper">
        <div class="loader-title">Interview<span>Pilot</span></div>
        <div class="loader-subtitle">Booting Environment...</div>
      </div>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Ensure the preloader stays on screen long enough to be perceived as a smooth splash screen
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('global-loader').classList.add('hidden');
      }, 600); // 600ms delay before fade out
    });
  </script>
</body>

</html>
